<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0f14;
      color: #eef8ff;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .card {
      max-width: 520px;
      text-align: center;
      padding: 2rem;
      border-radius: 18px;
      background: #111a22;
      border: 1px solid rgba(78, 195, 224, .18);
    }
    h1 { margin-bottom: .6rem; }
    p { color: #b7c5d7; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 1rem;
      color: #0a0f14;
      background: #4ec3e0;
      text-decoration: none;
      padding: .8rem 1rem;
      border-radius: 999px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank You!</h1>
    <p>Your booking request has been sent successfully. I’ll get back to you soon.</p>
    <a href="index.html">Back to Home</a>
  </div>
</body>
</html>
